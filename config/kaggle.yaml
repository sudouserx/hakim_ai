# hakim_ai — Kaggle T4-GPU Configuration
# Configured to prevent OOM errors on single 16GB VRAM instances.

pipeline_name: histopath_ai_kaggle
log_level: INFO
parallel_multi_slide: false   # Must be false to avoid OOM on single GPU

# Add lenient QC thresholds so real WSI passes Layer 0
qc:
  qc_enabled: false
  min_focus_quality: 0.0
  min_coverage: 0.0
  min_stain_quality: 0.0
  reject_on_artifact: false

foundation_models:
  use_gpu: true

navigation:
  top_k_patches: 2           # Reduced to save VRAM ( 10)

description:
  max_patches_to_describe: 1  # 3

segmentation:
  checkpoint_path: /kaggle/tmp/checkpoints/segformer_gchtid.pt


data:
  data_root: /kaggle/tmp/data/
  tcga_stad_url: "https://www.cancerimagingarchive.net/collection/tcga-stad/"
  gashis_url: "https://figshare.com/ndownloader/files/28969725"
  gchtid_url: "https://figshare.com/ndownloader/files/46765759"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  gashis_patch_sizes: [160]
  max_retries: 3
  chunk_size_mb: 8
  verify_checksums: true
  
training:
  tcga_data_root: /kaggle/tmp/data/tcga-stad/
  tcga_feature_dir: /kaggle/tmp/data/tcga-stad/features/
  tcga_manifest_csv: /kaggle/tmp/data/tcga-stad/manifest.csv
  gashis_data_root: /kaggle/tmp/data/gashis/
  gchtid_data_root: /kaggle/tmp/data/gchtid/
  batch_size: 64             # Increased batch size operates on pre-extracted feature vectors, not raw WSI
  learning_rate: 0.0001
  num_epochs: 1      #20
  num_folds: 3
  device: cuda
  checkpoint_dir: /kaggle/tmp/checkpoints

ui:
  output_dir: /kaggle/working/outputs
  html_report: true
  mdt_export: false
