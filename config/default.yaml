# hakim_ai — Default Configuration
# All values here are overridable per environment.
# Use config/test.yaml for CI and config/prod.yaml for production.

pipeline_name: histopath_ai_gastric
version: "0.1.0"
output_dir: outputs
log_level: INFO
parallel_multi_slide: false

# ── Layer 0: Quality Control ────────────────────────────────────────────────
qc:
  min_stain_quality: 0.50
  min_focus_quality: 0.50
  min_coverage: 0.30
  stain_normalizer: macenko    # macenko | reinhard | passthrough
  reject_on_artifact: true

# ── Layer 1: Router ─────────────────────────────────────────────────────────
router:
  benign_confidence_threshold: 0.85
  escalation_confidence_threshold: 0.40
  complexity_thresholds:
    routine: 0.70
    intermediate: 0.40

# ── Layer 2: Navigation ──────────────────────────────────────────────────────
navigation:
  magnification_levels: [5, 20, 40]
  top_k_patches: 20
  patch_size: 512
  encoder_model: uni2

# ── Layer 2: Segmentation ────────────────────────────────────────────────────
segmentation:
  model: segformer             # segformer | hovernet | cellvit
  checkpoint_path: checkpoints/segformer_gchtid.pt
  num_classes: 7
  patch_size: 512
  tissue_classes:
    - background
    - tumour
    - stroma
    - til
    - necrosis
    - normal_gland
    - muscle

# ── Layer 2: Patch Description ───────────────────────────────────────────────
description:
  vlm_model: pathchat          # pathchat | conch
  max_patches_to_describe: 5
  max_tokens: 256

# ── Layer 3: Molecular Prediction ────────────────────────────────────────────
molecular:
  model: multi_task_head
  msi_threshold: 0.53
  her2_threshold: 0.50
  ebv_threshold: 0.48

# ── Layer 3: RAG ─────────────────────────────────────────────────────────────
rag:
  knowledge_base_path: null    # null = use built-in knowledge base
  top_k_similar_cases: 3
  top_k_guidelines: 5
  embedding_model: biomed_bert # biomed_bert | text-embedding-3

# ── Layer 4: Verification ────────────────────────────────────────────────────
verification:
  temperature: 1.50            # temperature scaling parameter; >1 softens confidence
  abstention_threshold: 0.35
  ood_threshold: 0.25
  calibrated: false
  calibration_config: null

# ── Foundation Models ────────────────────────────────────────────────────────
foundation_models:
  patch_encoder: uni2
  slide_encoder: conch
  vlm: pathchat
  use_gpu: false

# ── Layer 6: UI ──────────────────────────────────────────────────────────────
ui:
  output_dir: outputs
  html_report: true
  mdt_export: true
  feedback_db_path: outputs/feedback.jsonl

# ── Training ─────────────────────────────────────────────────────────────────
training:
  tcga_data_root: data/tcga-stad/
  tcga_feature_dir: data/tcga-stad/features/
  tcga_manifest_csv: data/tcga-stad/manifest.csv
  gashis_data_root: data/gashis/
  gchtid_data_root: data/gchtid/
  batch_size: 32
  learning_rate: 0.0001
  num_epochs: 50
  num_folds: 5
  checkpoint_dir: checkpoints/
  device: auto

# ── Data Acquisition ────────────────────────────────────────────────────────
data:
  data_root: data/
  tcga_stad_url: "https://www.cancerimagingarchive.net/collection/tcga-stad/"
  gashis_url: "https://figshare.com/ndownloader/files/28969725"
  gchtid_url: "https://figshare.com/ndownloader/files/46765759"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  gashis_patch_sizes: [160]
  max_retries: 3
  chunk_size_mb: 8
  verify_checksums: true