# hakim_ai — Production Multi-GPU Training Configuration
# Configured for high-end server environments with multiple GPUs.

pipeline_name: histopath_ai_prod
output_dir: /var/lib/hakim_ai/outputs
parallel_multi_slide: true    # Enabled to utilize high CPU/RAM resources

verification:
  calibrated: true

training:
  batch_size: 128               # High batch size for multi-GPU
  num_epochs: 100
  tcga_data_root: /data/histopath/tcga-stad/
  tcga_feature_dir: /data/histopath/tcga-stad/features/
  tcga_manifest_csv: /data/histopath/tcga-stad/manifest.csv
  gashis_data_root: /data/histopath/gashis/
  gchtid_data_root: /data/histopath/gchtid/
  checkpoint_dir: /var/lib/hakim_ai/checkpoints/

ui:
  output_dir: /var/lib/hakim_ai/outputs
  feedback_db_path: /var/lib/hakim_ai/outputs/feedback.jsonl
